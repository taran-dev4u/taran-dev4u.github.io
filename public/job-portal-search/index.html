<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A US-focused job portal search tool with OPT-aware filters, latest-job search formats, ATS search operators, and smart role expansion.">
    <title>PortalScout Job Search</title>
    <link rel="icon" href="assets/portal-scout-mark.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/styles.css">
    <script src="assets/app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#results">Skip to results</a>

    <header class="topbar">
      <div class="brand">
        <img src="assets/portal-scout-mark.svg" width="44" height="44" alt="">
        <div>
          <p class="eyebrow">Direct job discovery</p>
          <h1>PortalScout Job Search</h1>
        </div>
      </div>
      <button class="ghost-button" type="button" id="themeToggle" aria-label="Toggle color theme">Dark mode</button>
    </header>

    <main class="app-shell">
      <section class="search-tool" aria-labelledby="searchHeading">
        <div class="section-heading">
          <h2 id="searchHeading">Search Builder</h2>
          <div class="mini-map" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>

        <form id="searchForm" class="search-form">
          <label class="field field-wide" for="jobTitle">
            <span>Job title</span>
            <input id="jobTitle" name="job" type="text" autocomplete="off" placeholder="Software engineer, data analyst">
          </label>

          <label class="field" for="locationSelect">
            <span>US market</span>
            <select id="locationSelect" name="location"></select>
          </label>

          <label class="field" for="timeFilter">
            <span>Freshness</span>
            <select id="timeFilter" name="time"></select>
          </label>

          <label class="field" for="sortSelect">
            <span>Result order</span>
            <select id="sortSelect" name="sort">
              <option value="recommended">Recommended</option>
              <option value="latest">Newest first</option>
              <option value="direct">Direct apply first</option>
              <option value="coverage">Broad coverage</option>
            </select>
          </label>

          <label class="field" for="engineSelect">
            <span>Search engine</span>
            <select id="engineSelect" name="engine">
              <option value="google">Google</option>
              <option value="duckduckgo">DuckDuckGo</option>
              <option value="bing">Bing</option>
              <option value="yahoo">Yahoo</option>
              <option value="kagi">Kagi</option>
              <option value="qwant">Qwant</option>
              <option value="brave">Brave</option>
              <option value="startpage">Startpage</option>
            </select>
          </label>

          <label class="field" for="remoteMode">
            <span>Work setting</span>
            <select id="remoteMode" name="remote">
              <option value="neutral">All work settings</option>
              <option value="onsite-hybrid">On-site or hybrid</option>
              <option value="hybrid">Hybrid</option>
              <option value="onsite">On-site</option>
              <option value="only">Remote only</option>
              <option value="exclude">Exclude remote</option>
            </select>
          </label>

          <label class="field" for="matchMode">
            <span>Title match</span>
            <select id="matchMode" name="match">
              <option value="smart">Smart related titles</option>
              <option value="exact">Exact title only</option>
            </select>
          </label>

          <label class="field" for="experienceSelect">
            <span>Experience</span>
            <select id="experienceSelect" name="experience">
              <option value="any">Any level</option>
              <option value="entry">Entry or new grad</option>
              <option value="mid">Mid level</option>
              <option value="senior">Senior or lead</option>
              <option value="manager">Manager plus</option>
              <option value="internship">Internship</option>
            </select>
          </label>

          <label class="field" for="employmentSelect">
            <span>Employment</span>
            <select id="employmentSelect" name="employment">
              <option value="any">Any employment</option>
              <option value="fulltime">Full-time</option>
              <option value="contract">Contract</option>
              <option value="parttime">Part-time</option>
              <option value="internship">Internship</option>
            </select>
          </label>

          <label class="field" for="authorizationSelect">
            <span>Authorization</span>
            <select id="authorizationSelect" name="authorization">
              <option value="optBroad">OPT-aware broad</option>
              <option value="none">No auth filter</option>
              <option value="currentAuthorized">US work authorized</option>
              <option value="sponsorNeeded">Future sponsorship</option>
              <option value="everify">E-Verify</option>
              <option value="optStrict">OPT/STEM OPT exact</option>
            </select>
          </label>

          <label class="field field-wide" for="includeTerms">
            <span>Must include</span>
            <input id="includeTerms" name="include" type="text" autocomplete="off" placeholder="Python, healthcare, sponsorship">
          </label>

          <label class="field field-wide" for="excludeTerms">
            <span>Exclude</span>
            <input id="excludeTerms" name="exclude" type="text" autocomplete="off" placeholder="staffing, unpaid, clearance">
          </label>

          <div class="action-row">
            <button class="primary-button" type="submit">Start Search</button>
            <button class="secondary-button" type="button" id="resetButton">Reset</button>
          </div>
        </form>

        <details class="advanced-panel" open>
          <summary>Portal groups</summary>
          <fieldset id="categoryFilters" class="filter-grid" aria-label="Portal groups"></fieldset>
        </details>
      </section>

      <section class="workspace">
        <aside class="side-panel" aria-label="Search summary">
          <div class="metric-row">
            <div>
              <span id="portalCount">0</span>
              <p>Portals</p>
            </div>
            <div>
              <span id="checkedCount">0</span>
              <p>Checked</p>
            </div>
          </div>

          <div class="panel-block">
            <h2>Actions</h2>
            <button class="secondary-button full-width" type="button" id="copyAllButton" disabled>Copy All Links</button>
            <button class="secondary-button full-width" type="button" id="copyCheckedButton" disabled>Copy Checked Links</button>
            <button class="secondary-button full-width" type="button" id="shareButton" disabled>Copy Share Link</button>
          </div>

          <div class="panel-block" id="relatedBlock" hidden>
            <h2>Related Titles</h2>
            <div id="relatedTitles" class="tag-list"></div>
          </div>

          <div class="panel-block">
            <h2>Current Query</h2>
            <pre id="queryPreview">Ready</pre>
          </div>

          <p id="toast" class="toast" role="status" aria-live="polite"></p>
        </aside>

        <section class="results-panel" aria-live="polite" aria-labelledby="resultsHeading">
          <div class="results-heading">
            <h2 id="resultsHeading">Results</h2>
            <p id="resultMeta">Ready</p>
          </div>
          <div id="emptyState" class="empty-state">
            <strong>Ready when you are.</strong>
          </div>
          <div id="results" class="results-list"></div>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <p>Original static job search utility. Not affiliated with the portals listed here.</p>
      <p><a href="README.md">Project notes</a></p>
    </footer>
  </body>
</html>
